<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 620" role="img" aria-label="Email marketing automation illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef4fa"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#73b655"/>
      <stop offset="1" stop-color="#4f9440"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0d2f50" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="980" height="620" rx="44" fill="url(#bg)"/>
  <circle cx="170" cy="140" r="104" fill="#73b655" opacity="0.10"/>
  <circle cx="850" cy="160" r="128" fill="#0d2f50" opacity="0.08"/>

  <!-- Main dashboard -->
  <g filter="url(#shadow)">
    <rect x="120" y="120" width="740" height="430" rx="28" fill="#ffffff"/>
    <rect x="120" y="120" width="740" height="58" rx="28" fill="#ffffff"/>
    <circle cx="154" cy="149" r="7" fill="#ef4444" opacity="0.50"/>
    <circle cx="176" cy="149" r="7" fill="#f59e0b" opacity="0.50"/>
    <circle cx="198" cy="149" r="7" fill="#10b981" opacity="0.50"/>
    <rect x="230" y="140" width="420" height="18" rx="9" fill="#f1f5f9" stroke="#e2e8f0"/>
  </g>

  <!-- Left: segments -->
  <rect x="150" y="210" width="220" height="310" rx="22" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="170" y="236" width="120" height="12" rx="6" fill="#0d2f50" opacity="0.18"/>
  <rect x="170" y="266" width="180" height="10" rx="5" fill="#0d2f50" opacity="0.10"/>
  <rect x="170" y="288" width="150" height="10" rx="5" fill="#0d2f50" opacity="0.10"/>

  <g>
    <rect x="170" y="330" width="180" height="44" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <circle cx="192" cy="352" r="10" fill="url(#accent)" opacity="0.9"/>
    <rect x="212" y="345" width="98" height="12" rx="6" fill="#0d2f50" opacity="0.14"/>

    <rect x="170" y="386" width="180" height="44" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <circle cx="192" cy="408" r="10" fill="#0d2f50" opacity="0.14"/>
    <rect x="212" y="401" width="126" height="12" rx="6" fill="#0d2f50" opacity="0.12"/>

    <rect x="170" y="442" width="180" height="44" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <circle cx="192" cy="464" r="10" fill="#73b655" opacity="0.35"/>
    <rect x="212" y="457" width="84" height="12" rx="6" fill="#0d2f50" opacity="0.10"/>
  </g>

  <!-- Right: email cards -->
  <rect x="400" y="210" width="430" height="170" rx="22" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="422" y="234" width="180" height="14" rx="7" fill="#0d2f50" opacity="0.16"/>
  <rect x="422" y="264" width="280" height="10" rx="5" fill="#0d2f50" opacity="0.10"/>
  <rect x="422" y="284" width="240" height="10" rx="5" fill="#0d2f50" opacity="0.10"/>

  <g>
    <rect x="422" y="312" width="190" height="46" rx="18" fill="#ffffff" stroke="#e2e8f0"/>
    <path d="M442 326h40l-20 14-20-14z" fill="url(#accent)" opacity="0.95"/>
    <rect x="492" y="328" width="92" height="12" rx="6" fill="#0d2f50" opacity="0.12"/>

    <rect x="630" y="312" width="180" height="46" rx="18" fill="#ffffff" stroke="#e2e8f0"/>
    <path d="M650 326h40l-20 14-20-14z" fill="#0d2f50" opacity="0.14"/>
    <rect x="700" y="328" width="76" height="12" rx="6" fill="#0d2f50" opacity="0.10"/>
  </g>

  <!-- Bottom: automation path -->
  <rect x="400" y="400" width="430" height="120" rx="22" fill="#ffffff" stroke="#e2e8f0"/>
  <rect x="422" y="426" width="150" height="12" rx="6" fill="#0d2f50" opacity="0.16"/>
  <rect x="422" y="452" width="280" height="10" rx="5" fill="#0d2f50" opacity="0.10"/>
  <rect x="422" y="472" width="240" height="10" rx="5" fill="#0d2f50" opacity="0.10"/>

  <path d="M410 392 C 520 350, 610 438, 720 388 C 790 356, 820 392, 840 372" fill="none" stroke="url(#accent)" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
</svg>
