<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 620" role="img" aria-label="UI/UX design illustration">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#eef4fa"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#73b655"/>
      <stop offset="1" stop-color="#4f9440"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0d2f50" flood-opacity="0.14"/>
    </filter>
  </defs>

  <rect width="980" height="620" rx="44" fill="url(#bg)"/>

  <circle cx="140" cy="120" r="92" fill="#73b655" opacity="0.10"/>
  <circle cx="840" cy="140" r="120" fill="#0d2f50" opacity="0.08"/>

  <!-- Browser frame -->
  <g filter="url(#shadow)">
    <rect x="120" y="110" width="740" height="450" rx="28" fill="#ffffff"/>
    <rect x="120" y="110" width="740" height="58" rx="28" fill="#ffffff"/>
    <circle cx="154" cy="139" r="7" fill="#ef4444" opacity="0.55"/>
    <circle cx="176" cy="139" r="7" fill="#f59e0b" opacity="0.55"/>
    <circle cx="198" cy="139" r="7" fill="#10b981" opacity="0.55"/>
    <rect x="230" y="130" width="420" height="18" rx="9" fill="#f1f5f9" stroke="#e2e8f0"/>
  </g>

  <!-- Left sidebar -->
  <rect x="150" y="190" width="180" height="340" rx="22" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="170" y="214" width="110" height="12" rx="6" fill="#0d2f50" opacity="0.18"/>
  <rect x="170" y="242" width="140" height="10" rx="5" fill="#0d2f50" opacity="0.12"/>
  <rect x="170" y="264" width="126" height="10" rx="5" fill="#0d2f50" opacity="0.12"/>
  <rect x="170" y="286" width="98" height="10" rx="5" fill="#0d2f50" opacity="0.12"/>

  <rect x="170" y="330" width="140" height="44" rx="14" fill="#ecfdf5" stroke="#cdebd0"/>
  <rect x="186" y="346" width="84" height="12" rx="6" fill="url(#accent)" opacity="0.95"/>
  <circle cx="296" cy="352" r="10" fill="#73b655" opacity="0.35"/>

  <!-- Main canvas -->
  <rect x="350" y="190" width="480" height="240" rx="22" fill="#f8fafc" stroke="#e2e8f0"/>
  <rect x="372" y="214" width="160" height="14" rx="7" fill="#0d2f50" opacity="0.16"/>
  <rect x="372" y="244" width="220" height="10" rx="5" fill="#0d2f50" opacity="0.10"/>
  <rect x="372" y="264" width="260" height="10" rx="5" fill="#0d2f50" opacity="0.10"/>

  <!-- Wireframe blocks -->
  <rect x="372" y="300" width="180" height="96" rx="18" fill="#ffffff" stroke="#e2e8f0"/>
  <rect x="566" y="300" width="242" height="44" rx="18" fill="#ffffff" stroke="#e2e8f0"/>
  <rect x="566" y="356" width="242" height="40" rx="18" fill="#ffffff" stroke="#e2e8f0"/>
  <rect x="392" y="320" width="112" height="10" rx="5" fill="#0d2f50" opacity="0.14"/>
  <rect x="392" y="342" width="144" height="10" rx="5" fill="#0d2f50" opacity="0.10"/>
  <rect x="392" y="364" width="86" height="10" rx="5" fill="#0d2f50" opacity="0.10"/>

  <!-- Bottom: components + tokens -->
  <rect x="350" y="450" width="300" height="80" rx="22" fill="#ffffff" stroke="#e2e8f0"/>
  <rect x="670" y="450" width="160" height="80" rx="22" fill="#ffffff" stroke="#e2e8f0"/>
  <rect x="372" y="474" width="140" height="12" rx="6" fill="#0d2f50" opacity="0.16"/>
  <rect x="372" y="500" width="220" height="10" rx="5" fill="#0d2f50" opacity="0.10"/>
  <rect x="694" y="474" width="84" height="12" rx="6" fill="#0d2f50" opacity="0.16"/>
  <circle cx="700" cy="510" r="10" fill="#73b655" opacity="0.85"/>
  <circle cx="730" cy="510" r="10" fill="#0d2f50" opacity="0.20"/>
  <circle cx="760" cy="510" r="10" fill="#73b655" opacity="0.35"/>

  <!-- Accent line -->
  <path d="M360 438 C 440 412, 520 460, 610 430 C 700 402, 760 438, 820 416" fill="none" stroke="url(#accent)" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
</svg>
